target:
  builder: trajectory_shard
  shard_root: ${TRAJ_ROOT:-/cache/Zhengwei/dgfm_teacher_traj/cifar10_ddpm128_p33}
  trajectory_file_glob: "*.pt"
  cache_limit: 2
  loss_type: mse
  huber_delta: 0.1
