base: configs/base.yaml
includes:
  - dataset/cifar10
  - model/map_unet
  - path/condot
  - scheduler/condot
  - target/teacher_trajectory
  - teacher/sampler
  - eval/map_branch

experiment:
  name: fm_cifar10_map_branch

runtime:
  cudnn_benchmark: true

train:
  objective: explicit_map
  batch_size: 256
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
