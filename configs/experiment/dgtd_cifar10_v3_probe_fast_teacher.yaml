base: configs/experiment/dgtd_cifar10_v3.yaml

experiment:
  name: dgtd_cifar10_v3_probe_fast_teacher

train:
  epochs: 6
  batch_size: 64
  num_workers: 4
  persistent_workers: true
  prefetch_factor: 4
  max_train_batches: 24
  max_val_batches: 6

teacher:
  num_inference_steps: 16
  retain_num_points: 9

scheduler:
  timewarp:
    num_bins: 32

eval:
  step_counts: [1, 2, 4, 8]
  num_fid_samples: 512
  fid_batch_size: 64
  sample_batch_size: 64
  fixed_grid_size: 64
  fixed_grid_batch_size: 64
  dump_image_count: 64

target:
  cache_limit: 1

dgtd:
  endpoint_anchor_weight: 0.1
  update_density_every: 4
  update_warp_every: 4
  warmup_frac: 0.10
  flatten_frac: 0.10
