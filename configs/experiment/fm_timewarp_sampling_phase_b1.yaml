base: configs/base.yaml
includes:
  - dataset/cifar10
  - model/unet_fm
  - path/condot
  - scheduler/condot
  - teacher/none
  - eval/baseline

experiment:
  name: fm_timewarp_sampling_phase_b1

timewarp_sampling:
  power_gamma: 2.0
  qualitative_num_examples: 8

timewarp_search:
  family: data_dense_power
  candidate_gammas: [1.10, 1.20, 1.30, 1.40, 1.50, 1.60, 1.75, 2.00, 2.25, 2.50, 2.75, 3.00]
  objective_steps: [8, 16]
  objective_weights: [0.5, 0.5]
  reference_strategies: [uniform, data_dense_power2]
  panel_steps: [8, 16]
