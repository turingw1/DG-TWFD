data:
  dataset_type: teacher_online
  batch_size: 128
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 8
  dataset_size: 4096
  val_dataset_size: 512
  trajectory_cache_mode: true
  num_cached_trajectories: 256
  time_grid_size: 32
  teacher_integration_steps: 12

runtime:
  amp: true
  gradient_accumulation: 1

model:
  hidden_channels: 96
  boundary_hidden_channels: 48
  cond_dim: 192
  time_embed_dim: 96
  student_num_blocks: 5
  timewarp_num_bins: 128

loss:
  defect_weight: 0.5
  warp_weight: 0.25
  boundary_weight: 0.1

schedule:
  num_bins: 128
  eta: 2.0

train:
  epochs: 20
  learning_rate: 2.0e-4
  weight_decay: 1.0e-4
  log_every: 50
  warp_update_every: 1
