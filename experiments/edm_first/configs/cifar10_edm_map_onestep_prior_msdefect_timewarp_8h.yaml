experiment:
  name: cifar10_edm_map_onestep_prior_msdefect_timewarp_8h

paths:
  data_root: ${DATA_ROOT:-datasets}/cifar10
  network: ${EDM_CIFAR10_NETWORK:-https://nvlabs-fi-cdn.nvidia.com/edm/pretrained/edm-cifar10-32x32-cond-vp.pkl}
  fid_stats: ${DATA_ROOT:-datasets}/cifar10/.dgfm_cache/fid_stats_cifar10_test_32_torch_fidelity_inceptionv3_2048.npz

runtime:
  device: cuda
  amp: false
  seed: 42

teacher:
  use_fp16: false
  rollout_steps: 18

train:
  objective: prior_endpoint
  resume_optimizer: false
  resume_step: false
  max_steps: 50000
  max_seconds: 28800
  batch_size: 384
  num_workers: 0
  lr: 1.0e-6
  weight_decay: 0.0
  log_every: 25
  save_every: 250
  match_weight: 1.0
  defect_weight: 0.05
  anchor_weight: 0.0
  perceptual_weight: 0.25
  perceptual_levels: 3
  prior_mid_u_low: 0.25
  prior_mid_u_high: 0.85
  sigma_data: 0.5
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0

timewarp:
  enabled: true
  num_bins: 32
  init: uniform
  lr: 1.0e-3
  update_every: 25
  ema_mu: 0.995
  beta: 0.75
  ratio_cap: 4.0
  curvature_weight: 0.0
  hf_weight: 0.0

eval:
  steps: [1, 2, 4, 8, 16]
  num_fid_samples: 4096
  fid_batch_size: 32
  sample_batch_size: 64
  fixed_grid_size: 64
  fixed_seed: 42
